name: Lite Bank E2E Tests

on:
  push:
    branches:
      - main

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Docker environment
        run: docker compose up -d --build

      - name: Wait for Frontend and Kafka UI
        run: npx wait-on http://localhost:3000 http://localhost:8080

      - name: Run Playwright tests in headless mode
        run: npx playwright test tests/registro-async.spec.js --project=chromium

      - name: Upload Playwright HTML report if test fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/